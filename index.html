<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chandler Seeley's project dashboard." />
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <button class="menu-button" type="button" aria-label="Open menu" aria-controls="projectDrawer" data-drawer-open>
        <span></span><span></span><span></span>
      </button>
      <a class="site-title" href="index.html">Project Dashboard</a>
      <label class="search-box">
        <span class="sr-only">Search projects</span>
        <input id="projectSearch" type="search" placeholder="Search projects" autocomplete="off" />
        <span class="search-icon" aria-hidden="true"></span>
      </label>
    </header>

    <aside class="project-drawer" id="projectDrawer" aria-label="Menu" aria-hidden="true">
      <div class="drawer-top">
        <strong>Project Dashboard</strong>
        <button class="close-button" type="button" aria-label="Close menu" data-drawer-close>×</button>
      </div>
      <nav>
        <a href="index.html" aria-current="page">Projects</a>
        <a href="https://github.com/chandlerseeley" target="_blank" rel="noreferrer">GitHub Profile</a>
      </nav>
    </aside>
    <button class="drawer-backdrop" type="button" aria-label="Close menu" data-drawer-close hidden></button>

    <main class="page-shell">
      <div class="project-grid" id="projectGrid"></div>
      <p class="empty-state" id="emptyState" hidden>No projects found.</p>
    </main>

    <script src="projects.js"></script>
    <script src="app.js"></script>
  </body>
</html>

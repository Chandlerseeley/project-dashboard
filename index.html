<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chandler Seeley's project dashboard." />
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260712-2" />
  </head>
  <body>
    <header class="site-header">
      <button class="menu-button" type="button" aria-label="Open menu" aria-controls="projectDrawer" data-drawer-open>
        <span></span><span></span><span></span>
      </button>
      <a class="site-title" href="index.html">Project Dashboard</a>
      <label class="search-box">
        <span class="sr-only">Search projects</span>
        <input id="projectSearch" type="search" placeholder="Search projects" autocomplete="off" />
        <span class="search-icon" aria-hidden="true"></span>
      </label>
    </header>

    <aside class="project-drawer" id="projectDrawer" aria-label="Menu" aria-hidden="true">
      <div class="drawer-top">
        <strong>Project Dashboard</strong>
        <button class="close-button" type="button" aria-label="Close menu" data-drawer-close>×</button>
      </div>
      <nav>
        <a href="index.html" aria-current="page">Projects</a>
        <a href="https://github.com/chandlerseeley" target="_blank" rel="noreferrer">GitHub Profile</a>
      </nav>
    </aside>
    <button class="drawer-backdrop" type="button" aria-label="Close menu" data-drawer-close hidden></button>

    <main class="page-shell">
      <div class="project-grid" id="projectGrid"></div>
      <p class="empty-state" id="emptyState" hidden>No projects found.</p>
    </main>

    <div class="modal-backdrop" id="editModal" hidden>
      <section class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="modal-heading">
          <div>
            <span>Edit project</span>
            <h2 id="editModalTitle">Project</h2>
          </div>
          <button class="close-button" type="button" aria-label="Close editor" data-edit-close>×</button>
        </div>
        <form id="editLinksForm">
          <input id="editProjectSlug" type="hidden" />
          <label>
            <span>Project name</span>
            <input id="editProjectTitle" type="text" placeholder="Project name" required />
          </label>
          <label>
            <span>Project URL</span>
            <input id="editSiteUrl" type="url" placeholder="https://..." required />
          </label>
          <label>
            <span>Source URL</span>
            <input id="editRepoUrl" type="url" placeholder="https://github.com/..." required />
          </label>
          <label>
            <span>Notion notes URL</span>
            <input id="editNotesUrl" type="url" placeholder="https://www.notion.so/..." />
          </label>
          <div class="modal-actions">
            <button class="cancel-button" type="button" data-edit-close>Cancel</button>
            <button class="save-button" type="submit">Save links</button>
          </div>
        </form>
      </section>
    </div>

    <script src="projects.js?v=20260712-2"></script>
    <script src="app.js?v=20260712-2"></script>
  </body>
</html>
